models:
  - name: products_t
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique:
              config:
                where: "price > 0"

  - name: orders_t
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique

  - name: customers_t
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

  - name: employees_t
    columns:
      - name: employee_id
        data_tests:
          - not_null
          - unique

  - name: stores_t
    columns:
      - name: store_id
        data_tests:
          - not_null
          - unique

  - name: order_items_t
    columns:
      - name: order_item_id
        data_tests:
          - not_null
          - unique